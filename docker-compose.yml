# ============================================================
# Nexus Docker Compose — 전체 서비스 오케스트레이션
# ============================================================

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexus-net

  # --- Backend (Fastify + Prisma + Claude Code CLI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus}?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      PORT: 8080
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CLAUDE_CONFIGS_DIR: /data/claude-configs
      PROJECTS_DIR: /data/projects
      PROJECTS_WT_DIR: /data/projects-wt
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - claude-configs:/data/claude-configs
      - projects:/data/projects
      - projects-wt:/data/projects-wt
    networks:
      - nexus-net

  # --- Frontend (Next.js) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - nexus-net

volumes:
  pgdata:
    driver: local
  claude-configs:
    driver: local
  projects:
    driver: local
  projects-wt:
    driver: local

networks:
  nexus-net:
    driver: bridge
